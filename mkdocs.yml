site_name: Performance Testing with Gatling
site_description: Comprehensive guide to performance testing methodology and Gatling load testing framework
site_author: Learning Team
site_url: https://nitinkc.github.io/GatlingLearning/

repo_name: nitinkc/GatlingLearning
repo_url: https://github.com/nitinkc/GatlingLearning

docs_dir: docs
site_dir: site

theme:
  name: mkdocs

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js
  - js/mermaid-init.js

extra_css:
  - https://unpkg.com/mermaid@10/dist/mermaid.css

