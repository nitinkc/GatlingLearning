# Gatling configuration for the learning project
# Full reference: https://gatling.io/docs/gatling/reference/current/core/configuration/

gatling {

  core {
    # Encoding used for reading data files (CSV, JSON templates)
    encoding = "utf-8"

    # Number of seconds Gatling waits before forcefully shutting down virtual users
    shutdownTimeout = 30
  }

  http {
    # Max number of concurrent connections PER HOST
    # Reduce if the target API rate-limits connections
    perUserCacheSize = 200

    # Enable warm-up (pre-heat connection pool before actual load)
    warmUpUrl = "https://jsonplaceholder.typicode.com"

    # DNS cache TTL (seconds)
    dnsCacheSize = 5000
  }

  charting {
    # Width of the HTML report charts in pixels
    noReports = false
  }

  data {
    writers = [console, file]
  }
}
